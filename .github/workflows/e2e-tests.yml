---
name: E2E Tests

on:
  push:
    branches: [main]
  schedule:
    # Run nightly at 3 AM UTC to save runner minutes
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allow manual triggering for high-risk PRs

jobs:
  # Job to detect which files have changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e-relevant: ${{ steps.filter.outputs.e2e-relevant }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for file changes
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          frontend:
            - 'frontend/**'
          e2e-relevant:
            - 'frontend/**'
            - 'backend/**'
            - 'frontend/e2e/**'

  frontend-e2e-tests:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.e2e-relevant == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Install frontend dependencies
      run: |
        cd frontend
        bun install

    - name: Install Playwright browsers
      run: |
        cd frontend
        bunx playwright install chromium

    - name: Set up Python and uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'
        enable-cache: true

    - name: Install backend dependencies
      run: uv sync

    - name: Start backend server
      run: |
        cd backend
        uv run python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 10  # Give server time to start

    - name: Generate API client
      run: |
        cd frontend
        bun run generate:api

    - name: Build frontend for E2E tests
      run: |
        cd frontend
        bun run build
      
    - name: Start frontend dev server
      run: |
        cd frontend
        bun start &
        sleep 15  # Give frontend time to start
        
    - name: Run Playwright E2E tests
      run: |
        cd frontend
        bunx playwright test --reporter=list

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30

    - name: Upload screenshots on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-screenshots
        path: frontend/test-results/
        retention-days: 7