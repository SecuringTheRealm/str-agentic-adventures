---
name: E2E Tests

on:
  push:
    branches: [main]
  schedule:
    # Run nightly at 3 AM UTC to save runner minutes
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allow manual triggering for high-risk PRs

jobs:
  # Job to detect which files have changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e-relevant: ${{ steps.filter.outputs.e2e-relevant }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Check for file changes
      uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          frontend:
            - 'frontend/**'
          e2e-relevant:
            - 'frontend/**'
            - 'backend/**'

  frontend-e2e-tests:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.e2e-relevant == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install frontend dependencies
      run: |
        cd frontend
        bun install

    - name: Install Playwright browsers
      run: |
        cd frontend
        bunx playwright install --with-deps chromium

    - name: Set up Python and uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.12'
        enable-cache: true

    - name: Install backend dependencies
      run: uv sync

    - name: Start backend server in test mode
      run: |
        cd backend
        uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        # Wait for backend to be ready (up to 60s)
        for i in $(seq 1 60); do
          if curl -fs http://localhost:8000/health > /dev/null 2>&1; then
            echo "Backend is ready"
            break
          fi
          sleep 1
        done
        curl -f http://localhost:8000/health || { echo "Backend failed to start"; exit 1; }
      env:
        # No Azure credentials → backend auto-enters fallback/deterministic mode
        ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"

    - name: Generate API client
      run: |
        cd frontend
        bun run generate:api

    - name: Run Playwright E2E tests
      run: |
        cd frontend
        bun run test:e2e
      env:
        CI: true

    - name: Upload Playwright report on failure
      uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 14

    - name: Upload test result traces on failure
      uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: playwright-test-results
        path: frontend/test-results/
        retention-days: 7
