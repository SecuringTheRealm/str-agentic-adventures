---
name: Fast Unit Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # Job to detect which files have changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Check for file changes
      uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          frontend:
            - 'frontend/**'
          backend:
            - 'backend/**'

  frontend-unit-tests:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Set up Python and uv
      uses: astral-sh/setup-uv@v8
      with:
        python-version: '3.12'
        enable-cache: true

    - name: Install backend dependencies
      run: uv sync

    - name: Start backend server
      run: |
        cd backend
        uv run python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 10

    - name: Install frontend dependencies
      run: |
        cd frontend
        bun install

    - name: Generate API client
      run: |
        cd frontend
        bun run generate:api

    - name: Run frontend unit tests (fast)
      run: |
        cd frontend
        bun test:run

    - name: Build frontend
      run: |
        cd frontend
        bun run build

  backend-unit-tests:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python and uv
      uses: astral-sh/setup-uv@v8
      with:
        python-version: '3.12'
        enable-cache: true

    - name: Install backend dependencies
      run: uv sync

    - name: Run backend unit tests (fast)
      run: |
        cd backend
        uv run python -m pytest tests/ -m "unit or not slow" --durations=10 -v

    - name: Run backend structure validation (unit tests)
      run: |
        cd backend
        uv run python -m pytest tests/test_structure_validation.py tests/test_end_to_end.py::TestComponentIntegration::test_api_route_coverage tests/test_end_to_end.py::TestComponentIntegration::test_model_field_consistency -m "unit" -v

    - name: Run backend linting
      run: |
        cd backend
        uv run python -c "
        import ast
        import os
        import sys

        # Simple syntax check instead of ruff
        python_files = []
        for root, dirs, files in os.walk('app'):
            for file in files:
                if file.endswith('.py'):
                    python_files.append(os.path.join(root, file))

        for file_path in python_files:
            try:
                with open(file_path, 'r', encoding='utf-8') as f:
                    ast.parse(f.read())
                print(f'✅ {file_path} syntax valid')
            except SyntaxError as e:
                print(f'❌ {file_path} syntax error: {e}')
                sys.exit(1)

        print('✅ All Python files have valid syntax')
        "