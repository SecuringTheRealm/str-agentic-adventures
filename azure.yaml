# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: str-agentic-adventures
metadata:
  template: str-agentic-adventures@0.0.1-beta

infra:
  provider: bicep
  path: infra
  module: main

services:
  backend:
    # Dockerfile is at the repository root; build context must include
    # pyproject.toml, uv.lock, README.md, and the backend/ directory.
    project: .
    language: python
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .

  frontend:
    project: frontend
    language: js
    host: staticwebapp
    # Vite writes the production build to frontend/dist
    dist: dist

pipeline:
  provider: github

hooks:
  preprovision:
    shell: sh
    run: |
      echo "Pre-provision: Validating environment configuration..."
      if [ -z "${AZURE_LOCATION:-}" ]; then
        echo "Hint: Set your preferred region with 'azd env set AZURE_LOCATION uksouth'"
      fi
    continueOnError: true

  # Generate the TypeScript API client from the running backend before packaging
  # the frontend.  Requires the backend to be reachable at localhost:8000.
  prepackage:
    shell: sh
    run: |
      echo "Pre-package: Generating TypeScript API client from backend OpenAPI schema..."
      cd frontend && bun run generate:api || echo "Warning: API client generation skipped (backend must be running on localhost:8000)."
    continueOnError: true

  postprovision:
    shell: sh
    run: |
      echo "Post-provision: Infrastructure is ready."
      echo ""
      echo "Bicep outputs have been saved to your azd environment."
      echo "View them with: azd env get-values"
      echo ""
      echo "AI Foundry resource and model deployments were provisioned automatically."
      echo "Deployed models: gpt-4.1-mini, text-embedding-3-small, gpt-image-1-mini,"
      echo "                 Phi-4-mini-instruct, Llama-4-Scout-17B-16E-Instruct"
      echo ""
      echo "The AZURE_OPENAI_ENDPOINT output is set automatically from the Foundry resource."
      echo "Managed identity auth is configured — no API key needed in production."
    continueOnError: false
